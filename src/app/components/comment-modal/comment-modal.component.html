<ion-header>
  <ion-toolbar>
    <ion-title>Commentaires</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item *ngFor="let comment of comments">
      {{comment}}
    </ion-item>
  </ion-list>

  <ion-item>

    <ion-input
      placeholder="Ajouter un commentaire"
      [formControl]="commentControl">
    </ion-input>

    <ion-button (click)="addComment()">
      Envoyer
    </ion-button>

  </ion-item>

</ion-content>

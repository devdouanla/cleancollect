<ion-header class="ion-no-border">
  <ion-toolbar
    style="--background: #ffffff; --ion-color-base: #ffffff; --border-width: 0; border-top-left-radius: 20px; border-top-right-radius: 20px;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" icon="arrow-back-outline" text=""
        style="color: #0b1528; --icon-font-size: 24px;"></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center" style="color: #0b1528; font-size: 16px; font-weight: 700;">Connexion</ion-title>
    <!-- Empty slot end to perfectly center the title -->
    <ion-buttons slot="end">
      <div style="width: 48px"></div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="login-content">
  <div style="display: flex; flex-direction: column; height: 100%; position: relative;">

    <!-- Top Graphic Placeholder Area -->
    <div
      style="height: 250px; width: 100%; background-color: #e5e5e5; background-image: linear-gradient(to bottom, #eff3f6, #cfd8dc); position: relative; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px;">
      <div style="display: flex; gap: 15px; opacity: 0.9;">
        <!-- Mocking the 3 trash bins with simple CSS divs -->
        <div class="mock-bin" style="background-color: #ffffff;"></div>
        <div class="mock-bin" style="background-color: #232d36;"></div>
        <div class="mock-bin" style="background-color: #232d36;"></div>
      </div>
    </div>

    <!-- Bottom Sheet Form Area -->
    <div class="ion-padding"
      style="background-color: #ffffff; flex-grow: 1; width: 100%; display: flex; flex-direction: column; position: relative; z-index: 2; box-shadow: 0 -10px 20px rgba(0, 0, 0, 0.03);">
      <div style="display: flex; flex-direction: column; flex-grow: 1;">

        <!-- Welcome Titles -->
        <h1 class="ion-text-center ion-margin-bottom"
          style="color: #0b1528; font-size: 28px; font-weight: 800; margin-top: 0; letter-spacing: -0.5px;">Bon retour !
        </h1>
        <p class="ion-text-center"
          style="color: #6a7c92; font-size: 14px; line-height: 1.5; margin-top: 0; margin-bottom: 30px;">Connectez-vous
          pour gérer vos collectes de déchets et vos paiements.</p>

        <!-- Input Form -->
        <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px;">

          <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="color: #0b1528; font-size: 13px; font-weight: 700;">Numéro de téléphone</label>
            <div class="custom-input-wrap">
              <ion-icon name="call-outline" class="prefix-icon"></ion-icon>
              <input type="tel" placeholder="Ex: 6xx xxx xxx" class="custom-input" />
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="color: #0b1528; font-size: 13px; font-weight: 700;">Mot de passe</label>
            <div class="custom-input-wrap">
              <ion-icon name="lock-closed-outline" class="prefix-icon"></ion-icon>
              <input type="password" placeholder="••••••••" class="custom-input" />
              <ion-icon name="eye-outline" class="suffix-icon"></ion-icon>
            </div>
          </div>

          <!-- Forgot Password -->
          <div class="ion-text-right" style="margin-top: 4px;">
            <a href="#" style="color: #26dc6a; font-size: 12px; font-weight: 700; text-decoration: none;">Mot de passe
              oublié ?</a>
          </div>

        </div>

        <!-- Login Button -->
        <button class="primary-btn">
          Se connecter
        </button>

        <!-- Or Divider -->
        <div style="display: flex; align-items: center; justify-content: center; margin: 24px 0; gap: 10px;">
          <span style="height: 1px; flex-grow: 1; background-color: #e1e9f0;"></span>
          <span style="color: #a0aab8; font-size: 12px; font-weight: 600;">OU</span>
          <span style="height: 1px; flex-grow: 1; background-color: #e1e9f0;"></span>
        </div>

        <!-- Register Link -->
        <div class="ion-text-center" style="font-size: 13px;">
          <span style="color: #6a7c92;">Nouveau sur CleanCollect ? </span>
          <a href="#" style="color: #26dc6a; font-weight: 700; text-decoration: none;">Créer un compte</a>
        </div>

      </div>

      <!-- Bottom Tabs -->
      <div style="display: flex; justify-content: center; gap: 40px; margin-top: auto; padding-top: 20px;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
          <ion-icon name="location-outline" style="color: #b0bac9; font-size: 20px;"></ion-icon>
          <span style="color: #b0bac9; font-size: 9px; font-weight: 700; letter-spacing: 0.5px;">GPS TRACKED</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
          <ion-icon name="cash-outline" style="color: #b0bac9; font-size: 20px;"></ion-icon>
          <span style="color: #b0bac9; font-size: 9px; font-weight: 700; letter-spacing: 0.5px;">MOBILE MONEY</span>
        </div>
      </div>

    </div>

  </div>
</ion-content>

<ion-header class="ion-no-border">
  <ion-toolbar
    style="--background: transparent; --ion-color-base: transparent; --border-width: 0; background-color: #26dc6a; border-top-left-radius: 20px; border-top-right-radius: 20px;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" icon="arrow-back-outline" text=""
        style="color: white; --icon-font-size: 24px;"></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center" style="color: white; font-size: 16px; font-weight: 600;">CleanCollect</ion-title>
    <!-- Empty slot end to perfectly center the title -->
    <ion-buttons slot="end">
      <div style="width: 48px"></div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="onboarding-content">
  <div
    style="display: flex; flex-direction: column; justify-content: space-between; height: 100%; padding: 0px 30px 40px 30px;">

    <!-- Top Image/Graphic Section -->
    <div
      style="display: flex; justify-content: center; align-items: center; height: 45%; width: 100%; margin-top: 10px;">
      <!-- Placeholder for the phone graphic -->
      <div
        style="width: 100%; height: 100%; background: linear-gradient(180deg, #FAD6A6 0%, #7CD4A8 50%, #46CB7F 100%); border-radius: 24px; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); position: relative;">
        <div
          style="width: 130px; height: 260px; background-color: #26b99a; border-radius: 20px; border: 4px solid #1c8c74; position: relative; display: flex; justify-content: center;">
          <div
            style="width: 50px; height: 12px; background-color: #1c8c74; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; position: absolute; top: 0;">
          </div>

          <!-- Mocking the little floating icons -->
          <div class="floating-icon" style="left: -24px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" rx="4" fill="#426B54" />
              <path
                d="M12 7C12.5523 7 13 6.55228 13 6C13 5.44772 12.5523 5 12 5C11.4477 5 11 5.44772 11 6C11 6.55228 11.4477 7 12 7Z"
                fill="white" />
              <path d="M12 9V14M12 14L9 19M12 14L15 19M9 9H15" stroke="white" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </div>

          <div class="floating-icon" style="right: -24px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" rx="4" fill="#FF8A00" />
              <circle cx="12" cy="12" r="4" fill="white" />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Text Content Section -->
    <div class="ion-text-center" style="margin-top: 20px; flex-grow: 1;">
      <h1
        style="color: white; font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 16px; letter-spacing: -0.5px;">
        Paiement Mobile<br>Money sécurisé</h1>
      <p style="color: white; font-size: 15px; font-weight: 400; line-height: 1.5; opacity: 0.9; margin: 0;">Payez
        facilement avec MTN<br>MoMo ou Orange Money en<br>quelques clics.</p>
    </div>

    <!-- Bottom Section (Pagination & Button) -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: 30px;">
      <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
      </div>

      <button class="primary-btn">
        Commencer
      </button>
    </div>

  </div>
</ion-content>

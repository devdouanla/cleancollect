<ion-header class="ion-no-border">
  <ion-toolbar
    style="--background: #ffffff; --ion-color-base: #ffffff; --border-width: 0; border-top-left-radius: 20px; border-top-right-radius: 20px;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" icon="arrow-back-outline" text=""
        style="color: #0b1528; --icon-font-size: 24px;"></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center"
      style="color: #0b1528; font-size: 16px; font-weight: 700;">Inscription</ion-title>
    <!-- Empty slot end to perfect center -->
    <ion-buttons slot="end">
      <div style="width: 48px"></div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="signup-content">
  <div style="display: flex; flex-direction: column; min-height: 100%; padding: 10px 30px 20px 30px;">

    <!-- Header Titles -->
    <div style="margin-bottom: 24px;">
      <h1
        style="color: #0b1528; font-size: 26px; font-weight: 800; margin-top: 0; margin-bottom: 12px; letter-spacing: -0.5px;">
        Créer un compte</h1>
      <p style="color: #6a7c92; font-size: 13px; line-height: 1.5; margin: 0;">Rejoignez CleanCollect pour gérer vos
        déchets facilement au Cameroun.</p>
    </div>

    <!-- Form Section -->
    <div style="display: flex; flex-direction: column; gap: 18px; margin-bottom: 24px;">

      <!-- Full Name -->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="color: #0b1528; font-size: 11px; font-weight: 700;">Nom complet</label>
        <div class="custom-input-wrap">
          <input type="text" placeholder="Ex: Jean Dupont" class="custom-input" />
          <ion-icon name="person-outline" class="suffix-icon"></ion-icon>
        </div>
      </div>

      <!-- Phone Number -->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="color: #0b1528; font-size: 11px; font-weight: 700;">Numéro de téléphone</label>
        <div class="custom-input-wrap" style="padding: 0; overflow: hidden;">
          <div
            style="background-color: #f8fafc; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0 16px; border-right: 1px solid #e1e9f0;">
            <span style="color: #475569; font-size: 12px; font-weight: 700;">+237</span>
          </div>
          <input type="tel" placeholder="6xx xxx xxx" class="custom-input"
            style="padding-left: 16px; padding-right: 16px;" />
        </div>
      </div>

      <!-- Email -->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="color: #0b1528; font-size: 11px; font-weight: 700;">Email</label>
        <div class="custom-input-wrap">
          <input type="email" placeholder="votre@email.com" class="custom-input" />
          <ion-icon name="mail-outline" class="suffix-icon"></ion-icon>
        </div>
      </div>

      <!-- Password -->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="color: #0b1528; font-size: 11px; font-weight: 700;">Mot de passe</label>
        <div class="custom-input-wrap">
          <input type="password" placeholder="••••••••" class="custom-input" />
          <ion-icon name="eye-outline" class="suffix-icon"></ion-icon>
        </div>
      </div>

    </div>

    <!-- Terms and conditions -->
    <div class="ion-text-center" style="margin-bottom: 20px;">
      <p style="color: #a0aab8; font-size: 10px; line-height: 1.5; margin: 0;">En créant un compte, vous acceptez nos <a
          href="#" style="color: #26dc6a; font-weight: 600; text-decoration: none;">Conditions<br>d'utilisation</a> et
        notre <a href="#" style="color: #26dc6a; font-weight: 600; text-decoration: none;">Politique de
          confidentialité.</a></p>
    </div>

    <!-- Submit Button -->
    <button class="submit-btn"
      style="width: 100%; height: 56px; background-color: #26dc6a; color: #ffffff; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(38, 220, 106, 0.3); margin-bottom: 24px; transition: transform 0.1s;">
      <span>Créer mon compte</span>
      <ion-icon name="chevron-forward-outline" style="font-size: 18px;"></ion-icon>
    </button>

    <!-- Bottom elements section -->
    <div style="margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 20px;">

      <!-- Trackers Tab -->
      <div style="display: flex; justify-content: center; gap: 30px;">
        <div style="display: flex; align-items: center; gap: 6px;">
          <ion-icon name="cash-outline" style="color: #6a7c92; font-size: 15px;"></ion-icon>
          <span style="color: #6a7c92; font-size: 9px; font-weight: 700; letter-spacing: 0.5px;">MOBILE MONEY</span>
        </div>
        <div style="display: flex; align-items: center; gap: 6px;">
          <ion-icon name="location-outline" style="color: #6a7c92; font-size: 15px;"></ion-icon>
          <span style="color: #6a7c92; font-size: 9px; font-weight: 700; letter-spacing: 0.5px;">GPS TRACKING</span>
        </div>
      </div>

      <!-- Login Link -->
      <div style="font-size: 13px;">
        <span style="color: #6a7c92;">Déjà un compte ? </span>
        <a href="#" style="color: #26dc6a; font-weight: 600; text-decoration: none;">Se connecter</a>
      </div>

      <!-- Bottom Swipe Line Indicator (decorative) -->
      <div style="width: 120px; height: 4px; background-color: #e1e9f0; border-radius: 2px; margin-top: auto;"></div>

    </div>

  </div>
</ion-content>

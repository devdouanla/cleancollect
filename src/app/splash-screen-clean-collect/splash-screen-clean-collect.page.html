<ion-content [fullscreen]="true" class="splash-content">
  <!-- Using a CSS background pattern or pseudo element for the watermark -->
  <div class="main-wrapper">
    <!-- Logo area -->
    <div class="logo-section">
      <div class="logo-container">
        <div class="white-circle">
          <!-- Recycle SVG Icon -->
          <svg class="recycle-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 19.5L3 17.5M3 17.5L5 13.5M3 17.5L8.5 17.5C11.5 17.5 14.5 16 16.5 13.5C18.5 11 19 8 18.5 5L15 6M17 4.5L21 6.5M21 6.5L19 10.5M21 6.5L15.5 6.5C12.5 6.5 9.5 8 7.5 10.5C5.5 13 5 16 5.5 19L9 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 6"/>
          </svg>
        </div>
        <div class="leaf-badge">
          <ion-icon name="leaf-outline"></ion-icon>
        </div>
      </div>
      
      <h1 class="brand-title">CleanCollect</h1>
      <p class="brand-subtitle">Collecte de déchets rapide et<br>intelligente</p>
    </div>

    <!-- Bottom area -->
    <div class="bottom-section">
      <div class="progress-header">
        <span class="loading-text">CHARGEMENT</span>
        <ion-icon name="location-outline" class="location-icon"></ion-icon>
      </div>
      
      <div class="progress-bar-bg">
        <div class="progress-bar-fill"></div>
      </div>
      
      <div class="footer-badge">
        <ion-icon name="cash-outline" class="cash-icon"></ion-icon>
        <span class="footer-text">MOBILE MONEY READY</span>
      </div>
    </div>
  </div>
</ion-content>
